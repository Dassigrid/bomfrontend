<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartPilot &mdash; Part Detail</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .part-num { font-family: var(--font-mono); font-size: clamp(20px, 4vw, 28px); font-weight: 700; margin-bottom: 4px; }
    .part-desc { font-size: 15px; color: var(--text-2); margin-bottom: 10px; }
    .status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pkg-info { font-size: 14px; color: var(--text-3); font-family: var(--font-mono); }
    .ss-card { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r); padding: 16px; margin-top: 16px; }
    .ss-row { display: flex; align-items: center; gap: 14px; margin-top: 10px; }
    .ss-num { font-family: var(--font-mono); font-size: 32px; font-weight: 700; line-height: 1; }
    .ss-num.high { color: var(--green); } .ss-num.med { color: var(--amber); } .ss-num.low { color: var(--red); }
    .ss-bar-wrap { flex: 1; }
    .ss-bar-bg { width: 100%; height: 8px; border-radius: 4px; background: var(--border-1); overflow: hidden; }
    .ss-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease 0.3s; }
    .ss-bar.high { background: linear-gradient(90deg, #34d399, #6ee7b7); }
    .ss-bar.med { background: linear-gradient(90deg, #fbbf24, #fde68a); }
    .ss-bar.low { background: linear-gradient(90deg, #f87171, #fca5a5); }
    .ss-detail { font-size: 13px; color: var(--text-2); margin-top: 6px; }
    .ss-verdict { margin-top: 10px; padding: 10px 14px; border-radius: var(--r-sm); font-size: 14px; font-weight: 600; line-height: 1.4; }
    .ss-verdict.safe { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .ss-verdict.caution { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
    .ss-verdict.danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }
    .dist { padding: 14px 16px; }
    .dist-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .dist-row { display: flex; justify-content: space-between; font-size: 14px; }
    .dist-stock { color: var(--green); font-weight: 600; font-family: var(--font-mono); }
    .dist-price { color: var(--blue); font-weight: 600; font-family: var(--font-mono); }
    .dist-lead { color: var(--text-3); font-size: 13px; margin-top: 4px; }
    .price-row { display: flex; gap: 24px; margin-top: 12px; padding: 12px 16px; background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r); }
    .price-row div { font-size: 14px; color: var(--text-2); }
    .price-row strong { display: block; font-size: 16px; font-family: var(--font-mono); color: var(--text-0); margin-top: 2px; }
    .issue { padding: 14px 16px; }
    .issue-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sev-dot.high { background: var(--red); } .sev-dot.med { background: var(--amber); } .sev-dot.low { background: var(--teal); }
    .issue-title { font-size: 14px; font-weight: 600; }
    .sev-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; margin-left: auto; }
    .sev-tag.high { background: var(--red-dim); color: var(--red); }
    .sev-tag.med { background: var(--amber-dim); color: var(--amber); }
    .sev-tag.low { background: var(--teal-dim); color: var(--teal); }
    .issue-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .issue-src { font-size: 12px; color: var(--text-3); margin-top: 6px; font-style: italic; }
    .alt { padding: 16px; }
    .alt-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 2px; }
    .alt-pn { font-family: var(--font-mono); font-size: 17px; font-weight: 700; }
    .alt-mfr { font-size: 14px; color: var(--text-2); }
    .safe-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 700; background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); white-space: nowrap; }
    .alt-conf { display: flex; align-items: center; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
    .alt-conf .cl { font-size: 13px; color: var(--text-3); }
    .alt-conf .cv { font-family: var(--font-mono); font-size: 17px; font-weight: 700; }
    .alt-conf .cv.high { color: var(--green); } .alt-conf .cv.med { color: var(--amber); }
    .detail-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
    @media (min-width: 768px) {
      .detail-grid { grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; }
      .detail-grid .full-span { grid-column: 1 / -1; }
      .ss-card { margin-top: 0; }
    }
    @media (min-width: 1024px) { .detail-grid { gap: 32px; } .alt { padding: 20px; } }
    @media (min-width: 1400px) { .detail-grid { gap: 40px; } }
  </style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a href="index.html" class="nav-logo">Part<b>Pilot</b></a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </a>
  </nav>

  <div class="tabs">
    <a href="index.html" class="tab active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </a>
    <a href="bom-upload.html" class="tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      BOM Upload
    </a>
  </div>

  <div class="px">
    <div class="search-wrap anim">
      <svg class="s-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" value="" />
    </div>
    <p class="search-sub">No signup required. Instant results.</p>
  </div>

  <div class="px">
    <div class="alert alert-danger mt anim anim-d1" id="alertBanner" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <p id="alertText"></p>
    </div>

    <div class="mt anim anim-d1">
      <div class="part-num" id="partNumber"></div>
      <div class="part-desc" id="partDesc"></div>
      <div class="status-row">
        <span class="badge" id="statusBadge"></span>
        <span class="pkg-info" id="pkgInfo"></span>
      </div>
    </div>

    <div class="detail-grid">
      <div class="ss-card anim anim-d2">
        <div class="stitle flex items-center gap-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Second Source Score
        </div>
        <div class="ss-row">
          <div class="ss-num" id="ssScore"></div>
          <div class="ss-bar-wrap">
            <div class="ss-bar-bg"><div class="ss-bar" id="ssBar" style="width:0%"></div></div>
            <div class="ss-detail" id="ssDetail"></div>
          </div>
        </div>
        <div class="ss-verdict" id="ssVerdict"></div>
      </div>

      <div class="anim anim-d2">
        <div class="stitle mt">Availability</div>
        <div id="distList"></div>
        <div class="price-row">
          <div>Best price<br><strong id="bestPrice"></strong></div>
          <div>Total stock<br><strong id="totalStock"></strong></div>
        </div>
      </div>

      <div class="full-span anim anim-d3">
        <div class="stitle mt">Key Specifications</div>
        <div class="spec-grid" id="specsGrid"></div>
      </div>

      <div class="full-span anim anim-d4">
        <div class="stitle mt">Known Issues</div>
        <div id="issuesList"></div>
      </div>

      <div class="full-span anim anim-d5">
        <div class="stitle mt">Recommended Alternates</div>
        <div id="altsList"></div>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const pn = params.get('part') || '';
  document.getElementById('searchInput').value = pn;
  document.title = 'PartPilot - ' + pn;

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = e.target.value.trim();
      if (v) window.location.href = `part-detail.html?part=${encodeURIComponent(v)}`;
    }
  });

  if (pn) loadPartDetail(pn);
</script>
</body>
</html>
